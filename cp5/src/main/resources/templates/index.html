<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de Feriados Nacionais</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
        min-height: 100vh;
    }

    .hero-card {
        border: none;
        border-radius: 24px;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.08);
        overflow: hidden;
    }

    .hero-header {
        background: linear-gradient(135deg, #0d6efd, #4f46e5);
        color: white;
        padding: 2rem;
    }

    .table-card {
        border: none;
        border-radius: 20px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
    }

    .badge-custom {
        background-color: #e9ecef;
        color: #212529;
        font-weight: 500;
    }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-10 col-xl-9">

      <div class="card hero-card mb-4">
        <div class="hero-header">
          <h1 class="display-6 fw-bold mb-2">Feriados Nacionais do Brasil</h1>
          <p class="mb-0 opacity-75">
            Consulte os feriados nacionais de qualquer ano utilizando Spring Boot, Thymeleaf e BrasilAPI.
          </p>
        </div>

        <div class="card-body p-4 p-md-5 bg-white">
          <form method="get" th:action="@{/feriados}" class="row g-3 align-items-end">
            <div class="col-md-8">
              <label for="ano" class="form-label fw-semibold">Escolha o ano</label>
              <input
                      type="number"
                      class="form-control form-control-lg"
                      id="ano"
                      name="ano"
                      min="1900"
                      max="2100"
                      th:value="${anoSelecionado}"
                      required>
            </div>

            <div class="col-md-4 d-grid">
              <button type="submit" class="btn btn-primary btn-lg">
                Buscar feriados
              </button>
            </div>
          </form>
        </div>
      </div>

      <div th:if="${mensagem != null}" class="alert alert-warning shadow-sm" role="alert" th:text="${mensagem}"></div>

      <div class="card table-card" th:if="${#lists.size(feriados) > 0}">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <h2 class="h4 mb-0">Feriados encontrados</h2>
            <span class="badge text-bg-primary fs-6" th:text="${anoSelecionado}"></span>
          </div>

          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
              <tr>
                <th>Data</th>
                <th>Nome</th>
                <th>Tipo</th>
              </tr>
              </thead>
              <tbody>
              <tr th:each="feriado : ${feriados}">
                <td th:text="${feriado.date()}"></td>
                <td class="fw-semibold" th:text="${feriado.name()}"></td>
                <td>
                  <span class="badge badge-custom" th:text="${feriado.type()}"></span>
                </td>
              </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="card table-card" th:if="${#lists.isEmpty(feriados) and mensagem == null}">
        <div class="card-body p-4 text-center">
          <h2 class="h5 mb-2">Nenhum feriado exibido</h2>
          <p class="text-muted mb-0">Selecione um ano e clique em <strong>Buscar feriados</strong>.</p>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

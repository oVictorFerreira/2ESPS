<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="fragments/layout :: layout (~{::title}, ~{::section})">

<head>
    <title>Contas</title>
</head>

<body>
<section>

    <h2 class="mb-4">Contas</h2>

    <table class="table table-bordered">
        <thead class="table-dark">
        <tr>
            <th>Número</th>
            <th>Cliente</th>
            <th>Saldo</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="account : ${accounts}">
            <td th:text="${account.acNumber}"></td>
            <td th:text="${account.customer.name}"></td>
            <td th:text="${account.balance}"></td>
        </tr>
        </tbody>
    </table>

    <a href="/view/accounts/create" class="btn btn-primary">Nova Conta</a>
    <a href="/" class="btn btn-secondary">Voltar</a>

</section>
</body>
</html>

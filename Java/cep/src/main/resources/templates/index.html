<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Busca CEP</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Consulta de CEP</h2>

        <form action="/buscar" method="post">
            <div class="input-group mb-3">
                <input type="text" name="cep" class="form-control" placeholder="Digite o CEP" required>
                <button class="btn btn-primary" type="submit">Buscar</button>
            </div>
        </form>

        <div th:if="${endereco != null}" class="mt-4">
            <h4>Resultado:</h4>
            <ul class="list-group">
                <li class="list-group-item"><b>CEP:</b> <span th:text="${endereco.cep}"></span></li>
                <li class="list-group-item"><b>Logradouro:</b> <span th:text="${endereco.logradouro}"></span></li>
                <li class="list-group-item"><b>Bairro:</b> <span th:text="${endereco.bairro}"></span></li>
                <li class="list-group-item"><b>Cidade:</b> <span th:text="${endereco.localidade}"></span></li>
                <li class="list-group-item"><b>UF:</b> <span th:text="${endereco.uf}"></span></li>
            </ul>
        </div>
    </div>
</div>

</body>
</html>
